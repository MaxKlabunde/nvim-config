# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'if-shell -F "#{pane_at_left}"   "" "select-pane -L"'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'if-shell -F "#{pane_at_bottom}" "" "select-pane -D"'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'if-shell -F "#{pane_at_top}"    "" "select-pane -U"'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'if-shell -F "#{pane_at_right}"  "" "select-pane -R"'

# Enable mouse support
set -g mouse on

# Send selections to the macOS clipboard. set-clipboard uses tmux's OSC-52
# bridge (requires the terminal emulator to allow OSC 52 — iTerm2: General >
# Selection > "Applications in terminal may access clipboard"). The
# copy-pipe-and-cancel fallback also pipes to pbcopy so a mouse drag-release
# or `y` in copy-mode lands directly in the system clipboard.
set -g set-clipboard on
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Show username and time in status bar (instead of hostname)
set -g status-right "#(whoami) %H:%M"

# New splits inherit cwd; the new pane takes 2/3, the existing one keeps 1/3.
# Workflow: quick-use shell stays on the left/top (1/3), editor on the
# right/bottom (2/3).
bind '"' split-window -v -l '67%' -c "#{pane_current_path}"
bind % split-window -h -l '67%' -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
